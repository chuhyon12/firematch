<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소방매치 - 대한민국 No.1 소방시설 매칭 플랫폼</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .step-active { color: #1d4ed8; border-bottom: 3px solid #1d4ed8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [step, setStep] = useState(0); // 0: Landing, 1~3: Form
            const [formData, setFormData] = useState({
                address: '',
                buildingType: '상가빌딩',
                area: '',
                service: '작동점검'
            });

            // 메인 페이지 (Landing)
            const LandingPage = () => (
                <div className="min-h-screen bg-white">
                    {/* Header */}
                    <nav className="flex justify-between items-center p-6 max-w-7xl mx-auto border-b">
                        <div className="text-2xl font-black text-blue-800">소방매치</div>
                        <div className="space-x-6 font-medium text-gray-600">
                            <a href="#" className="hover:text-blue-600">서비스 소개</a>
                            <a href="#" className="hover:text-blue-600">업체 찾기</a>
                            <button onClick={() => setStep(1)} className="bg-orange-500 text-white px-5 py-2 rounded-lg font-bold">견적 요청하기</button>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="py-20 px-6 max-w-7xl mx-auto flex flex-col md:flex-row items-center">
                        <div className="md:w-1/2 mb-10">
                            <h1 className="text-5xl font-extrabold leading-tight text-slate-900 mb-6">
                                복잡한 소방 점검,<br/>
                                <span className="text-blue-700">1분 만에</span> 견적 받으세요.
                            </h1>
                            <p className="text-xl text-gray-600 mb-8">
                                대한민국 소방시설법 준수 필수 점검!<br/>
                                검증된 소방시설관리업체 3,000개가 기다리고 있습니다.
                            </p>
                            <div className="flex space-x-4">
                                <button onClick={() => setStep(1)} className="bg-blue-700 text-white px-10 py-5 rounded-xl text-xl font-bold shadow-lg hover:bg-blue-800 transition">
                                    무료 견적 신청하기
                                </button>
                            </div>
                            <div className="mt-8 flex items-center space-x-4 text-sm text-gray-500">
                                <span><i className="fas fa-check-circle text-green-500"></i> 소방청 데이터 연동</span>
                                <span><i className="fas fa-check-circle text-green-500"></i> 평균 30% 비용 절감</span>
                            </div>
                        </div>
                        <div className="md:w-1/2 bg-blue-50 p-10 rounded-3xl border border-blue-100 shadow-inner text-center">
                             <img src="https://img.icons8.com/illustrations/external-tulpahn-outline-color-tulpahn/100/external-fire-station-public-service-tulpahn-outline-color-tulpahn.png" className="mx-auto mb-4 w-40" />
                             <p className="font-bold text-blue-900">내 건물의 소방 안전 등급은?</p>
                             <p className="text-blue-700 text-sm">지금 바로 확인해보세요.</p>
                        </div>
                    </header>
                </div>
            );

            // 다단계 견적 폼 (Multi-step Form)
            const RequestForm = () => (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center px-4">
                    <div className="max-w-xl w-full bg-white rounded-2xl shadow-2xl p-8">
                        {/* Steps Indicator */}
                        <div className="flex mb-8 border-b text-sm font-bold text-gray-400">
                            <div className={`flex-1 pb-4 text-center ${step >= 1 ? 'step-active' : ''}`}>01. 위치/용도</div>
                            <div className={`flex-1 pb-4 text-center ${step >= 2 ? 'step-active' : ''}`}>02. 건물 규모</div>
                            <div className={`flex-1 pb-4 text-center ${step >= 3 ? 'step-active' : ''}`}>03. 요청 확인</div>
                        </div>

                        {step === 1 && (
                            <div className="animate-fade-in">
                                <h2 className="text-2xl font-bold mb-6 text-slate-800">건물 위치를 알려주세요.</h2>
                                <label className="block text-sm font-bold mb-2">건물 주소</label>
                                <input 
                                    className="w-full border-2 p-4 rounded-xl mb-6 focus:border-blue-500 outline-none transition" 
                                    placeholder="예: 서울특별시 강남구 역삼동..."
                                    value={formData.address}
                                    onChange={(e) => setFormData({...formData, address: e.target.value})}
                                />
                                <label className="block text-sm font-bold mb-2">건물 용도</label>
                                <div className="grid grid-cols-2 gap-3 mb-8">
                                    {['상가빌딩', '아파트/빌라', '공장/창고', '오피스텔'].map(t => (
                                        <button 
                                            key={t}
                                            onClick={() => setFormData({...formData, buildingType: t})}
                                            className={`p-4 rounded-xl border-2 font-medium transition ${formData.buildingType === t ? 'border-blue-600 bg-blue-50 text-blue-700' : 'hover:bg-gray-50'}`}
                                        >
                                            {t}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setStep(2)} className="w-full bg-blue-700 text-white py-4 rounded-xl font-bold text-lg">다음 단계로</button>
                            </div>
                        )}

                        {step === 2 && (
                            <div>
                                <h2 className="text-2xl font-bold mb-6 text-slate-800">상세 정보를 입력해주세요.</h2>
                                <label className="block text-sm font-bold mb-2">연면적 (m²)</label>
                                <input 
                                    type="number"
                                    className="w-full border-2 p-4 rounded-xl mb-6 focus:border-blue-500 outline-none transition" 
                                    placeholder="연면적을 입력하세요"
                                    value={formData.area}
                                    onChange={(e) => setFormData({...formData, area: e.target.value})}
                                />
                                <label className="block text-sm font-bold mb-2">필요 서비스</label>
                                <div className="grid grid-cols-2 gap-3 mb-8">
                                    {['작동점검', '종합점검', '소방공사', '기타'].map(s => (
                                        <button 
                                            key={s}
                                            onClick={() => setFormData({...formData, service: s})}
                                            className={`p-4 rounded-xl border-2 font-medium transition ${formData.service === s ? 'border-blue-600 bg-blue-50 text-blue-700' : 'hover:bg-gray-50'}`}
                                        >
                                            {s}
                                        </button>
                                    ))}
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setStep(1)} className="flex-1 border-2 py-4 rounded-xl font-bold">이전</button>
                                    <button onClick={() => setStep(3)} className="flex-[2] bg-blue-700 text-white py-4 rounded-xl font-bold">견적 요청 완료</button>
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="text-center py-10">
                                <i className="fas fa-check-circle text-6xl text-green-500 mb-6"></i>
                                <h2 className="text-3xl font-bold mb-4 text-slate-800">접수 완료!</h2>
                                <p className="text-gray-600 mb-8 leading-relaxed">
                                    {formData.address} ({formData.buildingType})의<br/>
                                    <strong>{formData.service}</strong> 견적 요청이 주변 소방 업체<br/> 
                                    <span className="text-blue-700 font-bold text-xl">5곳</span>에 전달되었습니다.
                                </p>
                                <button onClick={() => setStep(0)} className="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">홈으로 돌아가기</button>
                            </div>
                        )}
                    </div>
                </div>
            );

            return (
                <div>
                    {step === 0 ? <LandingPage /> : <RequestForm />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
